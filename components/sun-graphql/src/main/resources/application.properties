spring.application.name=sun-graphql
spring.main.allow-bean-definition-overriding=true

# Shared database - all components live in this single Postgres database.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# Hades
hades.hide-threshold=-3

# Discord OAuth
discord.client-id=${DISCORD_CLIENT_ID:}
discord.client-secret=${DISCORD_CLIENT_SECRET:}
discord.guild-id=${DISCORD_GUILD_ID:}
discord.redirect-uri=${DISCORD_REDIRECT_URI:}
discord.bot-token=${DISCORD_BOT_TOKEN:}

# Email (Gmail SMTP XOAUTH2)
EMAIL_HOST=smtp.gmail.com
EMAIL_PORT=465
EMAIL_OAUTH=oauth2.googleapis.com
EMAIL_CLIENT_ID=${EMAIL_CLIENT_ID}
EMAIL_CLIENT_SECRET=${EMAIL_CLIENT_SECRET}
EMAIL_REFRESH_TOKEN=${EMAIL_REFRESH_TOKEN}
EMAIL_ADDRESS=${EMAIL_ADDRESS}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway - owns only the audit_events table (and its history). All other tables
# stay Hibernate-managed (ddl-auto=update). The DB is non-empty with no prior
# flyway_schema_history, so baseline-on-migrate from version 0 is required.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=false

# Audit
audit.enabled=${AUDIT_ENABLED:true}
audit.chain.key=${AUDIT_CHAIN_KEY:}
# Preserve the pass-through column naming the components were originally built with
# (e.g. createdAt -> createdat, not created_at). Without this, Spring Boot's default
# CamelCaseToUnderscores strategy would create mismatched audit columns on the shared DB.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

server.port=8083

# GraphQL Configuration
graphql.servlet.mapping=/graphql
graphql.servlet.enabled=true
# Browsers never reach the gateway directly; all calls go server-side via
# executeDocument, which forwards the per-app X-Client-Secret.
graphql.servlet.corsEnabled=false

# Per-app client secrets (matched by ClientSecretFilter against X-Client-Id).
client.secrets.guided-reader=${GUIDED_READER_CLIENT_SECRET:}
client.secrets.checklist=${CHECKLIST_CLIENT_SECRET:}
client.secrets.viewer=${VIEWER_CLIENT_SECRET:}
client.secrets.filestore=${FILESTORE_CLIENT_SECRET:}
