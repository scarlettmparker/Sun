spring.application.name=sun-graphql
spring.main.allow-bean-definition-overriding=true

# Apollo Database Configuration
spring.datasource.apollo.jdbc-url=${APOLLO_SPRING_DATASOURCE_URL}
spring.datasource.apollo.username=${APOLLO_SPRING_DATASOURCE_USERNAME}
spring.datasource.apollo.password=${APOLLO_SPRING_DATASOURCE_PASSWORD}
spring.datasource.apollo.driver-class-name=org.postgresql.Driver

# Briareus Database Configuration
spring.datasource.briareus.jdbc-url=${BRI_SPRING_DATASOURCE_URL}
spring.datasource.briareus.username=${BRI_SPRING_DATASOURCE_USERNAME}
spring.datasource.briareus.password=${BRI_SPRING_DATASOURCE_PASSWORD}
spring.datasource.briareus.driver-class-name=org.postgresql.Driver

# Cerberus Database Configuration
spring.datasource.cerberus.jdbc-url=${CERB_SPRING_DATASOURCE_URL}
spring.datasource.cerberus.username=${CERB_SPRING_DATASOURCE_USERNAME}
spring.datasource.cerberus.password=${CERB_SPRING_DATASOURCE_PASSWORD}
spring.datasource.cerberus.driver-class-name=org.postgresql.Driver

# Dionysus Database Configuration
spring.datasource.dionysus.jdbc-url=${DION_SPRING_DATASOURCE_URL}
spring.datasource.dionysus.username=${DION_SPRING_DATASOURCE_USERNAME}
spring.datasource.dionysus.password=${DION_SPRING_DATASOURCE_PASSWORD}
spring.datasource.dionysus.driver-class-name=org.postgresql.Driver

# Echo Database Configuration
spring.datasource.echo.jdbc-url=${ECHO_SPRING_DATASOURCE_URL}
spring.datasource.echo.username=${ECHO_SPRING_DATASOURCE_USERNAME}
spring.datasource.echo.password=${ECHO_SPRING_DATASOURCE_PASSWORD}
spring.datasource.echo.driver-class-name=org.postgresql.Driver

# Fates Database Configuration
spring.datasource.fates.jdbc-url=${FATES_SPRING_DATASOURCE_URL}
spring.datasource.fates.username=${FATES_SPRING_DATASOURCE_USERNAME}
spring.datasource.fates.password=${FATES_SPRING_DATASOURCE_PASSWORD}
spring.datasource.fates.driver-class-name=org.postgresql.Driver

# Gaia Database Configuration
spring.datasource.gaia.jdbc-url=${GAIA_SPRING_DATASOURCE_URL}
spring.datasource.gaia.username=${GAIA_SPRING_DATASOURCE_USERNAME}
spring.datasource.gaia.password=${GAIA_SPRING_DATASOURCE_PASSWORD}
spring.datasource.gaia.driver-class-name=org.postgresql.Driver

# Hades Database Configuration
spring.datasource.hades.jdbc-url=${HADES_SPRING_DATASOURCE_URL}
spring.datasource.hades.username=${HADES_SPRING_DATASOURCE_USERNAME}
spring.datasource.hades.password=${HADES_SPRING_DATASOURCE_PASSWORD}
spring.datasource.hades.driver-class-name=org.postgresql.Driver

# Icarus Database Configuration
spring.datasource.icarus.jdbc-url=${ICARUS_SPRING_DATASOURCE_URL}
spring.datasource.icarus.username=${ICARUS_SPRING_DATASOURCE_USERNAME}
spring.datasource.icarus.password=${ICARUS_SPRING_DATASOURCE_PASSWORD}
spring.datasource.icarus.driver-class-name=org.postgresql.Driver

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# Hades
hades.hide-threshold=-3

# Discord OAuth
discord.client-id=${DISCORD_CLIENT_ID:}
discord.client-secret=${DISCORD_CLIENT_SECRET:}
discord.guild-id=${DISCORD_GUILD_ID:}
discord.redirect-uri=${DISCORD_REDIRECT_URI:}
discord.bot-token=${DISCORD_BOT_TOKEN:}

# Email (Gmail SMTP XOAUTH2)
EMAIL_HOST=smtp.gmail.com
EMAIL_PORT=465
EMAIL_OAUTH=oauth2.googleapis.com
EMAIL_CLIENT_ID=${EMAIL_CLIENT_ID}
EMAIL_CLIENT_SECRET=${EMAIL_CLIENT_SECRET}
EMAIL_REFRESH_TOKEN=${EMAIL_REFRESH_TOKEN}
EMAIL_ADDRESS=${EMAIL_ADDRESS}

# JPA Configuration (will be overridden in config)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=8083

# GraphQL Configuration
graphql.servlet.mapping=/graphql
graphql.servlet.enabled=true
graphql.servlet.corsEnabled=true